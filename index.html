<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="userId" placeholder="Enter ID">
<button onclick="login()">Login</button>

<script>
function login(){
  const id = document.getElementById("userId").value;
  localStorage.setItem("userId", id);
  window.location = "dashboard.html";
}
</script>

</body>
</html>
